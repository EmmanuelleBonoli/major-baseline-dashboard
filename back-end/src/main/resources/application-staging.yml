spring:
  datasource:
    url: jdbc:mysql://${DB_HOST_STAGING}:${DB_PORT_STAGING}/${DB_NAME_STAGING}?createDatabaseIfNotExist=true
    username: ${DB_USER_STAGING}
    password: ${DB_PASSWORD_STAGING}

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-time: ${JWT_EXP_TIME}

springdoc:
  swagger-ui:
    enabled: false

cors:
  allowedOrigins: ${CLIENT_URL_STAGING}

logging:
  level:
    com.appdashboard: INFO

custom:
  api-url: ${API_URL_STAGING}
  client-url: ${CLIENT_URL_STAGING}

stores:
  google-play:
    service-account-json: ${GOOGLE_PLAY_SERVICE_ACCOUNT}
  apple:
    key-id: ${APPLE_KEY_ID}
    issuer-id: ${APPLE_ISSUER_ID}
    private-key: ${APPLE_PRIVATE_KEY}