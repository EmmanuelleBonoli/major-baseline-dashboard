spring:
  datasource:
    url: jdbc:mysql://${DB_HOST_DEV}:${DB_PORT_DEV}/${DB_NAME_DEV}?createDatabaseIfNotExist=true
    username: ${DB_USER_DEV}
    password: ${DB_PASSWORD_DEV}
  jpa:
    hibernate:
      ddl-auto: create-drop  # Drops and recreates the schema on each run. TODO : Switch to update once DatabaseInitializer is completely done
    show-sql: true
    properties:
      hibernate:
        format_sql: true
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-time: ${JWT_EXP_TIME}

springdoc:
  swagger-ui:
    enabled: true

cors:
  allowedOrigins: ${CLIENT_URL_DEV}

logging:
  level:
    com.appdashboard: DEBUG

custom:
  api-url: ${API_URL_DEV}
  client-url: ${CLIENT_URL_DEV}
  contact-email: ${CONTACT_EMAIL_DESTINATION}

stores:
  google-play:
    service-account-json: ${GOOGLE_PLAY_SERVICE_ACCOUNT}
  apple:
    key-id: ${APPLE_KEY_ID}
    issuer-id: ${APPLE_ISSUER_ID}
    private-key: ${APPLE_PRIVATE_KEY}