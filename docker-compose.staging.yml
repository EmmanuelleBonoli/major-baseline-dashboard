services:
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_STAGING}
      MYSQL_DATABASE: ${DB_NAME_STAGING}
      MYSQL_USER: ${DB_USER_STAGING}
      MYSQL_PASSWORD: ${DB_PASSWORD_STAGING}
    ports:
      - "3309:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_PASSWORD_STAGING}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DB_HOST_STAGING: mysql
      DB_PORT_STAGING: 3306
    ports:
      - "8082:8080"

  frontend:
    ports:
      - "8091:80"
