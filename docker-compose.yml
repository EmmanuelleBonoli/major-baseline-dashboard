services:
  mysql:
    image: mysql:8.0
    container_name: major-baseline-db
    restart: unless-stopped
    env_file:
      - ./back-end/.env
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: major-baseline-backend
    restart: unless-stopped
    env_file:
      - ./back-end/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: major-baseline-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
