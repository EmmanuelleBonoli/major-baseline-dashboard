services:
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_DEV}
      MYSQL_DATABASE: ${DB_NAME_DEV}
      MYSQL_USER: ${DB_USER_DEV}
      MYSQL_PASSWORD: ${DB_PASSWORD_DEV}
    ports:
      - "3308:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_PASSWORD_DEV}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: development
      DB_HOST_DEV: mysql
      DB_PORT_DEV: 3306
    ports:
      - "8080:8080"

  frontend:
    ports:
      - "3000:80"
